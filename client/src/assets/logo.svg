<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Browser window -->
  <rect x="30" y="50" width="140" height="100" rx="12" 
        fill="none" stroke="#FF0000" stroke-width="4"/>

  <!-- Top bar -->
  <line x1="30" y1="75" x2="170" y2="75" 
        stroke="#FF0000" stroke-width="4"/>

  <!-- Browser dots -->
  <circle cx="45" cy="62" r="4" fill="#FF0000"/>
  <circle cx="60" cy="62" r="4" fill="#FF0000"/>
  <circle cx="75" cy="62" r="4" fill="#FF0000"/>

  <!-- Lightning bolt -->
  <polygon points="100,85 85,115 100,115 90,145 120,105 105,105 115,85"
           fill="#FF0000"/>

  <!-- Code brackets -->
  <text x="65" y="135" font-size="20" fill="#FF0000" font-family="monospace">&lt;</text>
  <text x="125" y="135" font-size="20" fill="#FF0000" font-family="monospace">/&gt;</text>

</svg>